Kode/NoArgumentAlignment:
  Description: "Use exactly one space after commas between method call arguments, preventing column alignment."
  Enabled: true
  VersionAdded: "0.1"

Kode/NoHashAlignment:
  Description: "Use exactly one space after `=>` or `:` in hash pairs, preventing column alignment."
  Enabled: true
  VersionAdded: "0.1"

Kode/NoAssignmentAlignment:
  Description: "Use exactly one space before `=` in local/instance variable and setter assignments, preventing column alignment."
  Enabled: true
  VersionAdded: "0.1"
